stages:
  - build
  - test
  - synth
  - run
  - benchmark
  - collect

variables:
  ACCOUNT: "hpc-prf-cifi"
  SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 00:30:00 -n 1 --cpus-per-task=4 --mem 16g"
  HW_EMU_SYNTH_SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -q fpgasynthesis -t 1:00:00 -n 1 --mem 32g --cpus-per-task=32"
  HW_SYNTH_SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -q fpgasynthesis -t 4:00:00 -n 1 --mem 64g --cpus-per-task=64"
  SHORT_RUN_SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p fpga -t 00:30:00 -N 1 -n 6"
  LONG_RUN_SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p fpga -t 01:30:00 -N 1 -n 6"

default:
  id_tokens:
    CI_JOB_JWT:
      aud: https://git.uni-paderborn.de
  tags:
    - slurm
  before_script:
    - source env.sh

# ============================================================
# Build stage
#
# Build the test example with both Make and CMake flows to
# exercise the library integration paths.
# ============================================================

build:host:
  stage: build
  parallel:
    matrix:
      - BUILD_SYS: [make, cmake]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - |
      if [ "$BUILD_SYS" = "make" ]; then
        make -C test host
        cp test/build/host_aurora_flow_test host_aurora_flow_test
      else
        rm -rf build_cmake_host
        mkdir build_cmake_host
        cd build_cmake_host
        cmake ../test
        cmake --build . --target host_aurora_flow_test
        cd ..
        cp build_cmake_host/host_aurora_flow_test host_aurora_flow_test
      fi
    - mkdir -p build/${BUILD_SYS}/xrt${XRT}
    - cp host_aurora_flow_test build/${BUILD_SYS}/xrt${XRT}/
  artifacts:
    paths:
      - build/${BUILD_SYS}/xrt${XRT}/host_aurora_flow_test
  needs: []

build:sw_emu:
  stage: build
  parallel:
    matrix:
      - BUILD_SYS: [make, cmake]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - |
      if [ "$BUILD_SYS" = "make" ]; then
        make -C test TARGET=sw_emu FIFO_WIDTH=$WIDTH xclbin
        cp test/build/aurora_flow_test_sw_emu.xclbin aurora_flow_test_sw_emu.xclbin
        cp test/build/emconfig.json emconfig.json
      else
        rm -rf build_cmake_sw_emu
        mkdir build_cmake_sw_emu
        cd build_cmake_sw_emu
        cmake ../test -DFIFO_WIDTH=$WIDTH
        cmake --build . --target xclbin_sw_emu
        cmake --build . --target emconfig
        cd ..
        cp build_cmake_sw_emu/aurora_flow_test_sw_emu.xclbin aurora_flow_test_sw_emu.xclbin
        cp build_cmake_sw_emu/emconfig.json emconfig.json
      fi
    - mkdir -p build/${BUILD_SYS}/sw_emu/xrt${XRT}
    - cp aurora_flow_test_sw_emu.xclbin build/${BUILD_SYS}/sw_emu/xrt${XRT}/aurora_flow_test_sw_emu_${WIDTH}.xclbin
  artifacts:
    paths:
      - build/${BUILD_SYS}/sw_emu/xrt${XRT}/aurora_flow_test_sw_emu_${WIDTH}.xclbin
      - emconfig.json
  needs: []

build:hw_emu:
  stage: build
  variables:
    SCHEDULER_PARAMETERS: $HW_EMU_SYNTH_SCHEDULER_PARAMETERS
  parallel:
    matrix:
      - WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - make -C test TARGET=hw_emu FIFO_WIDTH=$WIDTH xclbin
    - mkdir -p build/hw_emu/xrt${XRT}
    - cp test/build/aurora_flow_test_hw_emu.xclbin build/hw_emu/xrt${XRT}/aurora_flow_test_hw_emu_${WIDTH}.xclbin
    - cp test/build/emconfig.json emconfig.json
  artifacts:
    paths:
      - build/hw_emu/xrt${XRT}/aurora_flow_test_hw_emu_${WIDTH}.xclbin
      - emconfig.json
  needs: []

# ============================================================
# Test stage (emulation + testbenches in parallel)
#
# Exercise both Make and CMake build outputs so both integration
# paths are verified end-to-end.
# ============================================================

test:sw_emu:
  stage: test
  variables:
    SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 00:30:00 -n 3 --mem 16g"
  parallel:
    matrix:
      - BUILD_SYS: [make, cmake]
        TOPOLOGY: [loopback, pair, ring]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - mkdir -p test/build
    - cp build/${BUILD_SYS}/xrt${XRT}/host_aurora_flow_test test/build/
    - cp build/${BUILD_SYS}/sw_emu/xrt${XRT}/aurora_flow_test_sw_emu_${WIDTH}.xclbin test/build/aurora_flow_test_sw_emu.xclbin
    - cp emconfig.json test/build/
    - ./test/scripts/run_${TOPOLOGY}_emu.sh sw_emu 3 -r 2 -i 10
  needs:
    - build:sw_emu
    - build:host

test:hw_emu:
  stage: test
  variables:
    SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 01:00:00 -n 3 --mem 16g"
  parallel:
    matrix:
      - TOPOLOGY: [loopback, pair, ring]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - mkdir -p test/build
    - cp build/make/xrt${XRT}/host_aurora_flow_test test/build/
    - cp build/hw_emu/xrt${XRT}/aurora_flow_test_hw_emu_${WIDTH}.xclbin test/build/aurora_flow_test_hw_emu.xclbin
    - cp emconfig.json test/build/
    - ./test/scripts/run_${TOPOLOGY}_emu.sh hw_emu 3 -r 2 -i 2 -b 256
  after_script:
    - rm -rf test/build/.hw_emu_rank_*
  needs:
    - build:hw_emu
    - build:host

test:hw_emu:nfc_test:
  stage: test
  variables:
    SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 02:00:00 -n 3 --mem 16g"
  parallel:
    matrix:
      - WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - mkdir -p test/build
    - cp build/make/xrt${XRT}/host_aurora_flow_test test/build/
    - cp build/hw_emu/xrt${XRT}/aurora_flow_test_hw_emu_${WIDTH}.xclbin test/build/aurora_flow_test_hw_emu.xclbin
    - cp emconfig.json test/build/
    - ./test/scripts/run_pair_emu.sh hw_emu 3 -r 1 -i 1 -b 65536 -n
  after_script:
    - rm -rf test/build/.hw_emu_rank_*
  needs:
    - build:hw_emu
    - build:host

test:nfc_module:
  stage: test
  script:
    - make run_nfc_tb
  only:
    changes:
      - rtl/aurora_flow_nfc.v
      - rtl/tb/aurora_flow_nfc_tb.v
      - tcl/run_nfc_tb.tcl
      - .gitlab-ci.yml
  artifacts:
    paths:
      - nfc_tb.vcd
      - nfc_tb.wdb

test:monitor_module:
  stage: test
  script:
    - make run_monitor_tb
  only:
    changes:
      - rtl/aurora_flow_monitor.v
      - rtl/tb/aurora_flow_monitor_tb.v
      - tcl/run_monitor_tb.tcl
      - .gitlab-ci.yml
  artifacts:
    paths:
      - monitor_tb.vcd
      - monitor_tb.wdb

test:configuration_module:
  stage: test
  script:
    - make run_configuration_tb
  only:
    changes:
      - rtl/aurora_flow_configuration.v
      - rtl/tb/aurora_flow_configuration_tb.v
      - tcl/run_configuration_tb.tcl
      - .gitlab-ci.yml
  artifacts:
    paths:
      - configuration_tb.vcd
      - configuration_tb.wdb

# ============================================================
# Synth stage (manual trigger)
# ============================================================

synth:
  stage: synth
  variables:
    SCHEDULER_PARAMETERS: $HW_SYNTH_SCHEDULER_PARAMETERS
  parallel:
    matrix:
      - FRAMING: ["0", "1"]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - make -C test xclbin USE_FRAMING=$FRAMING FIFO_WIDTH=$WIDTH
    - mkdir -p build/hw/xrt${XRT}
    - cp test/build/aurora_flow_test_hw.xclbin build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin
  artifacts:
    paths:
      - build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin
  needs:
    - job: test:hw_emu
      artifacts: false
    - job: test:hw_emu:nfc_test
      artifacts: false
    - job: test:nfc_module
      artifacts: false
      optional: true
    - job: test:monitor_module
      artifacts: false
      optional: true
    - job: test:configuration_module
      artifacts: false
      optional: true

# ============================================================
# Run stage (HW tests)
# ============================================================

run:hw:
  stage: run
  parallel:
    matrix:
      - TOPOLOGY: [loopback, pair, ring]
        FRAMING: ["0", "1"]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  variables:
    SCHEDULER_PARAMETERS: "${SHORT_RUN_SCHEDULER_PARAMETERS} --constraint=xilinx_u280_xrt${XRT}"
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - mkdir -p test/build
    - cp build/make/xrt${XRT}/host_aurora_flow_test test/build/
    - cp build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin test/build/
    - ./test/scripts/run_${TOPOLOGY}_hw.sh -p aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin
  artifacts:
    paths:
      - test/build/results.csv
  needs:
    - synth
    - build:host

run:nfc_test:
  stage: run
  parallel:
    matrix:
      - FRAMING: ["0", "1"]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  variables:
    SCHEDULER_PARAMETERS: "${SHORT_RUN_SCHEDULER_PARAMETERS} --constraint=xilinx_u280_xrt${XRT}"
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - mkdir -p test/build
    - cp build/make/xrt${XRT}/host_aurora_flow_test test/build/
    - cp build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin test/build/
    - ./test/scripts/run_pair_hw.sh -p aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin -n -l
  needs:
    - synth
    - build:host

# ============================================================
# Benchmark stage
# ============================================================

benchmark:
  stage: benchmark
  parallel:
    matrix:
      - XRT: ["2.14", "2.15", "2.16"]
        WIDTH: ["32", "64"]
        FRAMING: ["0"]
        FRAME_SIZE: ["0"]
      - XRT: ["2.14", "2.15", "2.16"]
        WIDTH: ["32", "64"]
        FRAMING: ["1"]
        FRAME_SIZE: ["4", "16", "32", "128"]
  variables:
    SCHEDULER_PARAMETERS: "${LONG_RUN_SCHEDULER_PARAMETERS} --constraint=xilinx_u280_xrt${XRT}"
  script:
    - ml fpga/xilinx/xrt/$XRT CMake/4.0.3-GCCcore-14.3.0
    - mkdir -p test/build
    - cp build/make/xrt${XRT}/host_aurora_flow_test test/build/
    - cp build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin test/build/
    - ./test/scripts/configure_pair_hw.sh
    - ./test/scripts/reset.sh
    - cd test/build && ./host_aurora_flow_test -m 1 -p aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin -f $FRAME_SIZE -l -i 20 -b 268435456 && cd -
    - mkdir -p results
    - mv test/build/results.csv results/results_xrt${XRT}_w${WIDTH}_f${FRAMING}_fs${FRAME_SIZE}.csv
  artifacts:
    paths:
      - results/results_xrt${XRT}_w${WIDTH}_f${FRAMING}_fs${FRAME_SIZE}.csv
  dependencies:
    - build:host
    - synth

# ============================================================
# Collect stage
# ============================================================

benchmark:collect:
  stage: collect
  variables:
    SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 00:10:00 -n 1 --mem 4g"
  script:
    - cat results/*.csv > results.csv
    - wc -l results.csv
  artifacts:
    paths:
      - results.csv
  needs:
    - benchmark
