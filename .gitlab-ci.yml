stages:
  - build
  - test
  - synth
  - run
  - benchmark
  - collect

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  ACCOUNT: "hpc-prf-cifi"
  SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 00:30:00 -n 1 --cpus-per-task=4 --mem 16g"
  HW_EMU_SYNTH_SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -q fpgasynthesis -t 1:00:00 -n 1 --mem 32g --cpus-per-task=32"
  HW_SYNTH_SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -q fpgasynthesis -t 4:00:00 -n 1 --mem 64g --cpus-per-task=64"
  SHORT_RUN_SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p fpga -t 00:30:00 -N 1 -n 6"
  LONG_RUN_SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p fpga -t 01:30:00 -N 1 -n 6"

default:
  id_tokens:
    CI_JOB_JWT:
      aud: https://git.uni-paderborn.de
  tags:
    - slurm
  before_script:
    - source env.sh

# ============================================================
# Build stage
# ============================================================

build:host:
  stage: build
  parallel:
    matrix:
      - XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT
    - make host
    - mkdir -p build/xrt${XRT}
    - cp host_aurora_flow_test build/xrt${XRT}/
  artifacts:
    paths:
      - build/xrt${XRT}/host_aurora_flow_test
  needs: []

build:sw_emu:
  stage: build
  parallel:
    matrix:
      - WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT
    - make TARGET=sw_emu FIFO_WIDTH=$WIDTH xclbin
    - mkdir -p build/sw_emu/xrt${XRT}
    - cp aurora_flow_test_sw_emu.xclbin build/sw_emu/xrt${XRT}/aurora_flow_test_sw_emu_${WIDTH}.xclbin
  artifacts:
    paths:
      - build/sw_emu/xrt${XRT}/aurora_flow_test_sw_emu_${WIDTH}.xclbin
      - emconfig.json
  needs: []

build:hw_emu:
  stage: build
  variables:
    SCHEDULER_PARAMETERS: $HW_EMU_SYNTH_SCHEDULER_PARAMETERS
  parallel:
    matrix:
      - WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT
    - make TARGET=hw_emu FIFO_WIDTH=$WIDTH xclbin
    - mkdir -p build/hw_emu/xrt${XRT}
    - cp aurora_flow_test_hw_emu.xclbin build/hw_emu/xrt${XRT}/aurora_flow_test_hw_emu_${WIDTH}.xclbin
  artifacts:
    paths:
      - build/hw_emu/xrt${XRT}/aurora_flow_test_hw_emu_${WIDTH}.xclbin
      - emconfig.json
  needs: []

# ============================================================
# Test stage (emulation + testbenches in parallel)
# ============================================================

test:sw_emu:
  stage: test
  variables:
    SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 00:30:00 -n 3 --mem 16g"
  parallel:
    matrix:
      - TOPOLOGY: [loopback, pair, ring]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT
    - cp build/xrt${XRT}/host_aurora_flow_test .
    - cp build/sw_emu/xrt${XRT}/aurora_flow_test_sw_emu_${WIDTH}.xclbin aurora_flow_test_sw_emu.xclbin
    - ./scripts/run_${TOPOLOGY}_emu.sh sw_emu 3 -r 2 -i 10
  needs:
    - build:sw_emu
    - build:host

test:hw_emu:
  stage: test
  variables:
    SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 01:00:00 -n 3 --mem 16g"
  parallel:
    matrix:
      - TOPOLOGY: [loopback, pair, ring]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT
    - cp build/xrt${XRT}/host_aurora_flow_test .
    - cp build/hw_emu/xrt${XRT}/aurora_flow_test_hw_emu_${WIDTH}.xclbin aurora_flow_test_hw_emu.xclbin
    - ./scripts/run_${TOPOLOGY}_emu.sh hw_emu 3 -r 2 -i 2 -b 256
  after_script:
    - rm -rf .hw_emu_rank_*
  needs:
    - build:hw_emu
    - build:host

test:hw_emu:nfc_test:
  stage: test
  variables:
    SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 02:00:00 -n 3 --mem 16g"
  parallel:
    matrix:
      - WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT
    - cp build/xrt${XRT}/host_aurora_flow_test .
    - cp build/hw_emu/xrt${XRT}/aurora_flow_test_hw_emu_${WIDTH}.xclbin aurora_flow_test_hw_emu.xclbin
    - ./scripts/run_pair_emu.sh hw_emu 3 -r 1 -i 1 -b 65536 -n
  after_script:
    - rm -rf .hw_emu_rank_*
  needs:
    - build:hw_emu
    - build:host

test:nfc_module:
  stage: test
  script:
    - make run_nfc_tb
  only:
    changes:
      - rtl/aurora_flow_nfc.v
      - rtl/aurora_flow_nfc_tb.v
      - tcl/run_nfc_tb.tcl
      - .gitlab-ci.yml
  artifacts:
    paths:
      - nfc_tb.vcd
      - nfc_tb.wdb

test:monitor_module:
  stage: test
  script:
    - make run_monitor_tb
  only:
    changes:
      - rtl/aurora_flow_monitor.v
      - rtl/aurora_flow_monitor_tb.v
      - tcl/run_monitor_tb.tcl
      - .gitlab-ci.yml
  artifacts:
    paths:
      - monitor_tb.vcd
      - monitor_tb.wdb

test:configuration_module:
  stage: test
  script:
    - make run_configuration_tb
  only:
    changes:
      - rtl/aurora_flow_configuration.v
      - rtl/aurora_flow_configuration_tb.v
      - tcl/run_configuration_tb.tcl
      - .gitlab-ci.yml
  artifacts:
    paths:
      - configuration_tb.vcd
      - configuration_tb.wdb

# ============================================================
# Synth stage (manual trigger)
# ============================================================

synth:
  stage: synth
  variables:
    SCHEDULER_PARAMETERS: $HW_SYNTH_SCHEDULER_PARAMETERS
  parallel:
    matrix:
      - FRAMING: ["0", "1"]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  script:
    - ml fpga/xilinx/xrt/$XRT
    - make xclbin USE_FRAMING=$FRAMING FIFO_WIDTH=$WIDTH
    - mkdir -p build/hw/xrt${XRT}
    - cp aurora_flow_test_hw.xclbin build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin
  only:
    - web
  artifacts:
    paths:
      - build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin
  needs:
    - job: test:sw_emu
      artifacts: false
    - job: test:hw_emu
      artifacts: false
    - job: test:hw_emu:nfc_test
      artifacts: false
    - job: test:nfc_module
      artifacts: false
      optional: true
    - job: test:monitor_module
      artifacts: false
      optional: true
    - job: test:configuration_module
      artifacts: false
      optional: true

# ============================================================
# Run stage (HW tests)
# ============================================================

run:hw:
  stage: run
  parallel:
    matrix:
      - TOPOLOGY: [loopback, pair, ring]
        FRAMING: ["0", "1"]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  variables:
    SCHEDULER_PARAMETERS: "${SHORT_RUN_SCHEDULER_PARAMETERS} --constraint=xilinx_u280_xrt${XRT}"
  script:
    - ml fpga/xilinx/xrt/$XRT
    - cp build/xrt${XRT}/host_aurora_flow_test .
    - cp build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin .
    - ./scripts/run_${TOPOLOGY}_hw.sh -p aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin
  only:
    - web
  artifacts:
    paths:
      - results.csv
  needs:
    - synth
    - build:host

run:nfc_test:
  stage: run
  parallel:
    matrix:
      - FRAMING: ["0", "1"]
        WIDTH: ["32", "64"]
        XRT: ["2.14", "2.15", "2.16"]
  variables:
    SCHEDULER_PARAMETERS: "${SHORT_RUN_SCHEDULER_PARAMETERS} --constraint=xilinx_u280_xrt${XRT}"
  script:
    - ml fpga/xilinx/xrt/$XRT
    - cp build/xrt${XRT}/host_aurora_flow_test .
    - cp build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin .
    - ./scripts/run_pair_hw.sh -p aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin -n -l
  only:
    - web
  needs:
    - synth
    - build:host

# ============================================================
# Benchmark stage
# ============================================================

benchmark:
  stage: benchmark
  parallel:
    matrix:
      - XRT: ["2.14", "2.15", "2.16"]
        WIDTH: ["32", "64"]
        FRAMING: ["0"]
        FRAME_SIZE: ["0"]
      - XRT: ["2.14", "2.15", "2.16"]
        WIDTH: ["32", "64"]
        FRAMING: ["1"]
        FRAME_SIZE: ["4", "16", "32", "128"]
  variables:
    SCHEDULER_PARAMETERS: "${LONG_RUN_SCHEDULER_PARAMETERS} --constraint=xilinx_u280_xrt${XRT}"
  script:
    - ml fpga/xilinx/xrt/$XRT
    - cp build/xrt${XRT}/host_aurora_flow_test .
    - cp build/hw/xrt${XRT}/aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin .
    - ./scripts/configure_pair_hw.sh
    - ./scripts/reset.sh
    - ./host_aurora_flow_test -m 1 -p aurora_flow_test_hw_${FRAMING}_${WIDTH}.xclbin -f $FRAME_SIZE -l -i 20 -b 268435456
    - mkdir -p results
    - mv results.csv results/results_xrt${XRT}_w${WIDTH}_f${FRAMING}_fs${FRAME_SIZE}.csv
  only:
    - web
  artifacts:
    paths:
      - results/results_xrt${XRT}_w${WIDTH}_f${FRAMING}_fs${FRAME_SIZE}.csv
  dependencies:
    - build:host
    - synth

# ============================================================
# Collect stage
# ============================================================

benchmark:collect:
  stage: collect
  variables:
    SCHEDULER_PARAMETERS: "-A ${ACCOUNT} -p normal -t 00:10:00 -n 1 --mem 4g"
  script:
    - cat results/*.csv > results.csv
    - wc -l results.csv
  only:
    - web
  artifacts:
    paths:
      - results.csv
  needs:
    - benchmark
