[connectivity]
nk=send:2:send_0,send_1
nk=recv:2:recv_0,recv_1
nk=aurora_flow_sw_emu:2:aurora_flow_sw_emu_0,aurora_flow_sw_emu_1

# AXI connections
stream_connect=send_0.data_output:aurora_flow_sw_emu_0.tx_axis
stream_connect=aurora_flow_sw_emu_0.rx_axis:recv_0.data_input
stream_connect=send_1.data_output:aurora_flow_sw_emu_1.tx_axis
stream_connect=aurora_flow_sw_emu_1.rx_axis:recv_1.data_input

stream_connect=recv_0.loopback_ack_stream:send_0.loopback_ack_stream
stream_connect=recv_1.loopback_ack_stream:send_1.loopback_ack_stream
stream_connect=recv_0.pair_ack_stream:send_1.pair_ack_stream
stream_connect=recv_1.pair_ack_stream:send_0.pair_ack_stream
